worker_processes 1;
pid /tmp/nginx/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 256;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Upstream: dynamic playlist generator (Python, port 8081)
    upstream playlist_generator {
        server 127.0.0.1:8081;
    }

    # ── Playlist cache ──────────────────────────────────────────────
    # Stored on the persistent volume so it survives pod restarts.
    # Historical/event playlists are immutable (the segments they
    # reference will not change), so caching them is safe.
    # Live playlists send Cache-Control: no-store → NGINX skips them.
    #
    # Sizing: each cached playlist is ~5-15 KB. At 100 MB max we can
    # hold thousands of unique timestamp queries comfortably.
    proxy_cache_path /data/cache/playlist
        levels=1:2               # two-level directory hash (256 × 256 buckets)
        keys_zone=playlist:2m    # 2 MB shared-memory zone (~16 000 keys)
        max_size=100m            # hard cap on disk usage
        inactive=7d              # evict entries not accessed for 7 days
        min_free=50m             # stop caching when <50 MB free on volume
        use_temp_path=off;       # write directly into cache dir (no rename overhead)

    server {
        listen 8080;
        root /data;
        server_tokens off;

        # HLS dynamic playlist – proxy to playlist generator
        # Live:       /index.m3u8              → no-store (bypasses cache)
        # Historical: /index.m3u8?timestamp=X  → cached 24 h (immutable)
        # Event:      /index.m3u8?timestamp=X&mode=event → cached 24 h
        location = /index.m3u8 {
            proxy_pass http://playlist_generator;
            proxy_set_header Host $host;

            # ── cache settings ──
            proxy_cache            playlist;
            proxy_cache_key        $uri$is_args$args;
            proxy_cache_valid      200 24h;        # cache 200s for 24 h
            proxy_cache_valid      503 5s;         # "no segments yet" → retry fast
            proxy_cache_lock       on;             # coalesce concurrent identical requests
            proxy_cache_lock_age   5s;             # if lock holder is slow, let others through
            proxy_cache_use_stale  error timeout updating http_500 http_502 http_503;
            proxy_cache_bypass     $http_cache_control;   # honour client Cache-Control: no-cache
            proxy_buffering        on;

            # Expose cache status for debugging (HIT / MISS / BYPASS / STALE)
            add_header X-Cache-Status $upstream_cache_status always;
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        }

        # DASH manifest (static, written by FFmpeg) – never cache
        location ~ \.mpd$ {
            add_header Cache-Control "no-store, must-revalidate";
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        }

        # HLS segments (.ts) – immutable (filename = epoch timestamp)
        location ~ /hls/segments/.*\.ts$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        }

        # DASH segments (.m4s) – immutable
        location ~ \.m4s$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        }

        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
}
