worker_processes 1;
pid /tmp/nginx/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 256;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    upstream playlist_generator {
        server 127.0.0.1:8081;
    }

    proxy_cache_path /data/cache/playlist
        levels=1:2 keys_zone=playlist:2m max_size=50m
        inactive=7d use_temp_path=off;

    proxy_cache_path /data/cache/s3
        levels=1:2 keys_zone=s3_cache:2m max_size=100m
        inactive=10m use_temp_path=off;

    server {
        listen 8080;
        root /data;
        server_tokens off;

        # ── HLS (AAC .ts) ──
        # /index.m3u8 → dynamic playlist from generator
        location = /index.m3u8 {
            proxy_pass http://playlist_generator;
            proxy_set_header Host $host;
            proxy_cache playlist;
            proxy_cache_key $uri$is_args$args;
            proxy_cache_valid 200 24h;
            proxy_cache_valid 503 5s;
            proxy_cache_lock on;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_bypass $http_cache_control;
            proxy_buffering on;
            add_header X-Cache-Status $upstream_cache_status always;
        }

        # HLS AAC segments — try local, fallback S3
        location ~ ^/hls/segments/.*\.ts$ {
            try_files $uri @s3_hls;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location @s3_hls {
            set $s3_host "${S3_BUCKET}.${S3_ENDPOINT}";
            proxy_pass https://$s3_host/${STATION_SLUG}$uri;
            proxy_set_header Host $s3_host;
            proxy_ssl_server_name on;
            proxy_cache s3_cache;
            proxy_cache_key $uri;
            proxy_cache_valid 200 10m;
            proxy_cache_valid 404 5s;
            proxy_cache_lock on;
            proxy_hide_header x-amz-request-id;
            proxy_hide_header x-amz-id-2;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Segment-Source "s3" always;
        }

        # ── DASH (Opus fMP4) ──
        # Served at /dash/... (via ingress /dash/<slug>/...) OR /manifest.mpd (rewritten)
        location = /dash/manifest.mpd {
            alias /data/dash/manifest.mpd;
            add_header Cache-Control "no-store, must-revalidate";
        }
        location = /manifest.mpd {
            alias /data/dash/manifest.mpd;
            add_header Cache-Control "no-store, must-revalidate";
        }

        # DASH segments — /dash/0/*.m4s or /0/*.m4s (after ingress rewrite)
        location ~ ^/(dash/)?\d+/.*\.m4s$ {
            # Rewrite /0/... to /dash/0/... for try_files
            rewrite ^/(\d+/.*)$ /dash/$1 last;
        }
        location ~ ^/dash/\d+/.*\.m4s$ {
            try_files $uri @s3_dash;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location @s3_dash {
            set $s3_host "${S3_BUCKET}.${S3_ENDPOINT}";
            proxy_pass https://$s3_host/${STATION_SLUG}$uri;
            proxy_set_header Host $s3_host;
            proxy_ssl_server_name on;
            proxy_cache s3_cache;
            proxy_cache_key $uri;
            proxy_cache_valid 200 10m;
            proxy_cache_valid 404 5s;
            proxy_cache_lock on;
            proxy_hide_header x-amz-request-id;
            proxy_hide_header x-amz-id-2;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Segment-Source "s3" always;
        }

        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
}
