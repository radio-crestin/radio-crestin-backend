worker_processes 1;
pid /tmp/nginx/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 256;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Upstream: dynamic playlist generator (Python, port 8081)
    upstream playlist_generator {
        server 127.0.0.1:8081;
    }

    # Playlist cache for timestamped/historical requests
    proxy_cache_path /data/cache/playlist
        levels=1:2
        keys_zone=playlist:2m
        max_size=100m
        inactive=7d
        min_free=50m
        use_temp_path=off;

    server {
        listen 8080;
        root /data;
        server_tokens off;

        # ── CORS is handled by the K8s ingress controller ──
        # Do NOT add Access-Control-Allow-Origin here to avoid duplicate headers.

        # HLS dynamic playlist - proxy to playlist generator
        location = /index.m3u8 {
            proxy_pass http://playlist_generator;
            proxy_set_header Host $host;

            proxy_cache            playlist;
            proxy_cache_key        $uri$is_args$args;
            proxy_cache_valid      200 24h;
            proxy_cache_valid      503 5s;
            proxy_cache_lock       on;
            proxy_cache_lock_age   5s;
            proxy_cache_use_stale  error timeout updating http_500 http_502 http_503;
            proxy_cache_bypass     $http_cache_control;
            proxy_buffering        on;

            add_header X-Cache-Status $upstream_cache_status always;
        }

        # DASH manifest - never cache
        location ~ \.mpd$ {
            add_header Cache-Control "no-store, must-revalidate";
        }

        # HLS segments (.ts) - immutable
        location ~ /hls/segments/.*\.ts$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # DASH segments (.m4s) - immutable
        location ~ \.m4s$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
}
