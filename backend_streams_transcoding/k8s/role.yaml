apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: stream-controller
  namespace: radio-crestin
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "persistentvolumeclaims"]
    verbs: ["get", "list", "create", "delete", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "create", "delete", "patch"]
