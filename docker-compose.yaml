services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    restart: unless-stopped
    shm_size: 2gb
    volumes:
      - db_data:/home/postgres/pgdata/data
    env_file:
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "postgres", "-U", "postgres" ]
      timeout: 45s
      interval: 10s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-file: "5"   # number of files or file count
        max-size: "100m" # file size
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --notify-keyspace-events Exe
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "100m"
  web:
    build:
      context: backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app:delegated
      - /app/__pycache__
      - /app/**/__pycache__
    env_file:
      - .env
    stdin_open: true
    tty: true
    command: /app/scripts/run-server.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "100m"
  priority-worker:
    build:
      context: backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app:delegated
      - /app/__pycache__
      - /app/**/__pycache__
    env_file:
      - .env
    command: /app/scripts/run-priority-worker.sh
    healthcheck:
      test: ["CMD-SHELL", "celery -A superapp inspect ping --destination celery@$$HOSTNAME 2>/dev/null | grep -q OK || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "100m"
  worker:
    build:
      context: backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app:delegated
      - /app/__pycache__
      - /app/**/__pycache__
    env_file:
      - .env
    command: /app/scripts/run-worker.sh
    healthcheck:
      test: ["CMD-SHELL", "celery -A superapp inspect ping --destination celery@$$HOSTNAME 2>/dev/null | grep -q OK || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "100m"
  # Stream controller (manages per-station live streaming pods in K8s)
  # In local dev, runs as a single container for all stations
  stream-controller:
    build:
      context: backend_streams_transcoding
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    environment:
      - GRAPHQL_ENDPOINT=http://web:8080/v1/graphql
      - SYNC_INTERVAL=60
      - INGRESS_HOST=live.radiocrestin.ro
      - LEGACY_INGRESS_HOST=hls.radiocrestin.ro
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "100m"

  # Live streaming station pod (for local dev testing with a single station)
  live-streaming:
    build:
      context: backend_streams_transcoding/live_streaming
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "8085:8080"  # NGINX streaming port
    environment:
      - STATION_SLUG=${DEV_STATION_SLUG:-radio-eldad}
      - STREAM_URL=${DEV_STREAM_URL:-https://c40.radioboss.fm/stream/170}
      - RETENTION_DAYS=7
      - STREAMING_POD_API_KEY=${STREAMING_POD_API_KEY:-dev-streaming-key}
      - DJANGO_GRAPHQL_URL=http://web:8080/v1/graphql
    volumes:
      - live_streaming_data:/data
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "100m"

volumes:
  db_data:
  redis:
  live_streaming_data:
