<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Radio Crestin Live</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script crossorigin src="https://unpkg.com/htm@3/dist/htm.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,system-ui,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f1a;color:#e0e0e0;overflow-x:hidden}
:root{--accent:#00d4ff;--bg-card:#161625;--bg-dark:#0a0a14;--border:#2a2a3a;--text-dim:#666;--green:#00c853;--red:#ff4444}
.container{max-width:900px;margin:0 auto;padding:12px}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
button{background:#1a2a4a;color:#ddd;border:1px solid var(--border);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit;transition:background .15s}
button:hover{background:#243a5a}
button:active{background:var(--accent);color:#000}
button.active{background:var(--accent);color:#000;font-weight:600}
audio{width:100%;border-radius:6px;margin:6px 0}

.now-playing{display:flex;align-items:center;gap:14px;padding:4px 0}
.now-thumb{width:52px;height:52px;border-radius:10px;object-fit:cover;flex-shrink:0}
.now-icon{width:52px;height:52px;background:#1a2a4a;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.now-info{flex:1;min-width:0}
.now-title{font-size:15px;color:var(--accent);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.now-artist{font-size:13px;color:#999;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.now-meta{display:flex;gap:8px;margin-top:3px;font-size:11px;color:var(--text-dim);align-items:center;flex-wrap:wrap}
.badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600}
.badge-up{background:rgba(0,200,83,.15);color:var(--green)}
.badge-down{background:rgba(255,68,68,.15);color:var(--red)}
.badge-listeners{background:rgba(0,212,255,.1);color:var(--accent)}

.history-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid var(--border);font-size:13px}
.history-item:last-child{border-bottom:none}
.history-item.playing{background:rgba(0,212,255,.1);border-left:3px solid var(--accent);padding-left:7px}
.history-item.playing .history-song{color:var(--accent)}
.history-item.playing .history-play{opacity:1;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.history-thumb{width:36px;height:36px;border-radius:6px;object-fit:cover;flex-shrink:0}
.history-thumb-placeholder{width:36px;height:36px;border-radius:6px;background:#1a2a4a;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.history-info{flex:1;min-width:0}
.history-song{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history-artist{font-size:12px;color:#999;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history-time{color:var(--text-dim);font-size:11px;flex-shrink:0;font-variant-numeric:tabular-nums}
.history-listeners{font-size:11px;color:var(--accent);flex-shrink:0}
.history-play{color:var(--accent);font-size:14px;flex-shrink:0}

.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:8px}
.tab-bar button{border:none;border-bottom:2px solid transparent;border-radius:0;background:none;color:var(--text-dim);padding:6px 14px;font-size:12px}
.tab-bar button.active{border-bottom-color:var(--accent);color:var(--accent);background:none}
.tab-bar button:hover{color:#ccc;background:none}

.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:4px;font-size:12px}
.stat{padding:4px 8px;background:var(--bg-dark);border-radius:4px;display:flex;justify-content:space-between}
.stat .k{color:var(--text-dim)}.stat .v{color:var(--accent)}

.section-title{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:600}
.error-msg{color:var(--red);font-size:12px;padding:8px;background:rgba(255,68,68,.08);border-radius:4px;margin-bottom:8px}

@media(max-width:600px){
  .container{padding:8px}
  .card{padding:8px;margin-bottom:8px}
  .row{gap:4px}
  button{padding:5px 10px;font-size:12px}
  .stats{grid-template-columns:1fr 1fr}
  .now-title{font-size:14px}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
const h = htm.bind(React.createElement);
const{useState,useEffect,useRef,useCallback}=React;

// API base: ?api=<url> param > same-origin (when served from Django) > localhost fallback
const _params=new URLSearchParams(location.search);
const API_BASE = _params.get('api') || (location.port==='8085' ? 'http://localhost:8080' : 'https://api.radiocrestin.ro');

function detectBaseUrl(){
  const hlsParam=_params.get('hls');
  if(hlsParam)return hlsParam.replace(/\/$/,'');
  const p=location.pathname;
  const i=p.indexOf('/player.html');
  if(i>0)return location.origin+p.substring(0,i);
  if(p.length>1&&p.endsWith('/'))return location.origin+p.slice(0,-1);
  return location.origin;
}

function detectStationSlug(){
  const params=new URLSearchParams(location.search);
  if(params.get('station'))return params.get('station');
  const p=location.pathname.replace(/\/player\.html$/,'').replace(/\/$/,'');
  const parts=p.split('/').filter(Boolean);
  return parts.length>0?parts[parts.length-1]:null;
}

const retryPolicy={maxNumRetry:3,retryDelayMs:1000,maxRetryDelayMs:4000};
const hlsRetryConfig={
  manifestLoadPolicy:{default:{maxTimeToFirstByteMs:10000,maxLoadTimeMs:15000,timeoutRetry:retryPolicy,errorRetry:retryPolicy}},
  playlistLoadPolicy:{default:{maxTimeToFirstByteMs:10000,maxLoadTimeMs:15000,timeoutRetry:retryPolicy,errorRetry:retryPolicy}},
};

function qs(params){const p=new URLSearchParams(params);p.set('ref','dev-player');p.set('s','dev-user');return '?'+p.toString()}
function ts10(){return Math.floor(Date.now()/10000)*10}

function App(){
  const[baseUrl]=useState(detectBaseUrl);
  const[stationSlug,setStationSlug]=useState(detectStationSlug);
  const[slugInput,setSlugInput]=useState('');
  const[codec,setCodec]=useState('aac');
  const[playing,setPlaying]=useState(false);
  const[stats,setStats]=useState({});

  // API data
  const[metadata,setMetadata]=useState(null);
  const[historyEntries,setHistoryEntries]=useState([]);
  const[historyOldest,setHistoryOldest]=useState(null);
  const[historyLoading,setHistoryLoading]=useState(false);
  const[historyDone,setHistoryDone]=useState(false);
  const[apiError,setApiError]=useState(null);
  const[tab,setTab]=useState('history');

  const audioRef=useRef(null);
  const hlsRef=useRef(null);
  const HISTORY_PAGE_HOURS=3;

  // Auto-detect station slug from the streaming pod's config
  useEffect(()=>{
    if(stationSlug)return;
    fetch(baseUrl+'/config.json')
      .then(r=>r.json())
      .then(d=>{if(d?.station_slug)setStationSlug(d.station_slug)})
      .catch(()=>{});
  },[baseUrl]);

  const lastSongIdRef=useRef(null);

  const refreshHistory=useCallback(()=>{
    if(!stationSlug)return;
    const n=Math.floor(Date.now()/1000);
    const f=n-HISTORY_PAGE_HOURS*3600;
    _fetchHistoryPage(stationSlug,f,n,true);
  },[stationSlug]);

  // Fetch metadata — polls every 5s, triggers history refresh on song change
  useEffect(()=>{
    if(!stationSlug)return;
    const fetchMeta=()=>{
      const t=ts10();
      fetch(API_BASE+'/api/v1/stations-metadata?timestamp='+t+'&station_slugs='+encodeURIComponent(stationSlug))
        .then(r=>r.json())
        .then(d=>{
          const stations=d?.data?.stations_metadata;
          if(stations&&stations.length>0){
            const m=stations[0];
            setMetadata(m);
            setApiError(null);
            const songId=m?.now_playing?.song?.id||null;
            if(songId&&songId!==lastSongIdRef.current){
              lastSongIdRef.current=songId;
              refreshHistory();
            }
          }
        })
        .catch(e=>setApiError('Metadata API: '+e.message));
    };
    fetchMeta();
    const id=setInterval(fetchMeta,5000);
    return()=>clearInterval(id);
  },[stationSlug,refreshHistory]);

  // Fetch initial history page + background poll every 30s
  useEffect(()=>{
    if(!stationSlug)return;
    const now=Math.floor(Date.now()/1000);
    const from=now-HISTORY_PAGE_HOURS*3600;
    setHistoryEntries([]);
    setHistoryOldest(from);
    setHistoryDone(false);
    _fetchHistoryPage(stationSlug,from,now,true);
    const id=setInterval(refreshHistory,30000);
    return()=>clearInterval(id);
  },[stationSlug,refreshHistory]);

  function _fetchHistoryPage(slug,from,to,isRefresh){
    if(!isRefresh)setHistoryLoading(true);
    fetch(API_BASE+'/api/v1/stations-metadata-history?station_slug='+encodeURIComponent(slug)+'&from_timestamp='+from+'&to_timestamp='+to)
      .then(r=>r.json())
      .then(d=>{
        const hist=d?.data?.stations_metadata_history;
        if(!hist)return;
        const newEntries=hist.history||[];
        if(isRefresh){
          setHistoryEntries(prev=>{
            const older=prev.filter(e=>Math.floor(new Date(e.timestamp).getTime()/1000)<from);
            const seen=new Set(newEntries.map(e=>e.timestamp));
            const kept=older.filter(e=>!seen.has(e.timestamp));
            return [...kept,...newEntries].sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
          });
        } else {
          setHistoryEntries(prev=>{
            const existing=new Set(prev.map(e=>e.timestamp));
            const unique=newEntries.filter(e=>!existing.has(e.timestamp));
            return [...unique,...prev].sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
          });
          if(newEntries.length===0)setHistoryDone(true);
          setHistoryOldest(from);
        }
        setHistoryLoading(false);
      })
      .catch(()=>setHistoryLoading(false));
  }

  const loadOlderHistory=useCallback(()=>{
    if(historyLoading||historyDone||!stationSlug||!historyOldest)return;
    const to=historyOldest;
    const from=to-HISTORY_PAGE_HOURS*3600;
    if(Math.floor(Date.now()/1000)-from>7*86400){setHistoryDone(true);return;}
    _fetchHistoryPage(stationSlug,from,to,false);
  },[historyLoading,historyDone,stationSlug,historyOldest]);

  const destroyHls=useCallback(()=>{
    if(hlsRef.current){hlsRef.current.destroy();hlsRef.current=null}
    if(audioRef.current){audioRef.current.removeAttribute('src');audioRef.current.load()}
  },[]);

  const loadLive=useCallback((c)=>{
    destroyHls();
    const url=c==='master'?baseUrl+'/master.m3u8'+qs():baseUrl+'/aac/index.m3u8'+qs();
    if(!Hls.isSupported()){audioRef.current.src=url;audioRef.current.play().catch(()=>{});return}
    // Pre-load ~2 minutes ahead so brief network hiccups don't stall playback.
    // liveSyncDuration=120 sits the playhead ~2 min behind the live edge;
    // maxBufferLength=120 lets hls.js fill that headroom with segments.
    // maxBufferSize bumped to ~24MB to fit ~2 min of 64kbps AAC + headroom.
    const hls=new Hls(Object.assign({debug:false,enableWorker:true,liveSyncDuration:120,liveMaxLatencyDuration:150,maxBufferLength:120,maxMaxBufferLength:240,maxBufferSize:24*1000*1000,maxBufferHole:.5},hlsRetryConfig));
    hls.on(Hls.Events.MANIFEST_PARSED,()=>{audioRef.current?.play().catch(()=>{})});
    hls.on(Hls.Events.ERROR,(_,d)=>{if(d.fatal){if(d.type===Hls.ErrorTypes.NETWORK_ERROR)hls.startLoad();else if(d.type===Hls.ErrorTypes.MEDIA_ERROR)hls.recoverMediaError()}});
    hls.attachMedia(audioRef.current);
    hls.loadSource(url);
    hlsRef.current=hls;
  },[baseUrl,destroyHls]);

  const switchCodec=useCallback((c)=>{setCodec(c);loadLive(c)},[loadLive]);

  useEffect(()=>{loadLive('aac')},[]);

  // Playback monitor: track stats
  useEffect(()=>{
    const id=setInterval(()=>{
      const a=audioRef.current;if(!a)return;
      const buf=a.buffered.length>0?a.buffered.end(a.buffered.length-1)-a.currentTime:0;
      let lat='N/A';try{if(hlsRef.current?.latency)lat=hlsRef.current.latency.toFixed(1)+'s'}catch(e){}
      setPlaying(!a.paused);
      setStats({buffer:buf.toFixed(1)+'s',latency:lat,time:a.currentTime.toFixed(1)+'s',paused:String(a.paused)});
    },500);
    return()=>clearInterval(id);
  },[]);

  const np=metadata?.now_playing;
  const song=np?.song;
  const uptime=metadata?.uptime;

  return h`
    <div className="container">
      ${apiError?h`<div className="error-msg">${apiError}</div>`:null}
      ${!stationSlug?h`
        <div className="card">
          <div className="row">
            <label>Station slug:</label>
            <input placeholder="e.g. radio-eldad" value=${slugInput} onInput=${e=>setSlugInput(e.target.value)} style=${{flex:1}}
              onKeyDown=${e=>{if(e.key==='Enter'&&slugInput.trim())setStationSlug(slugInput.trim())}} />
            <button onClick=${()=>{if(slugInput.trim())setStationSlug(slugInput.trim())}}>Connect</button>
          </div>
          <div style=${{fontSize:'11px',color:'var(--text-dim)',marginTop:'4px'}}>
            No station detected. Add ?station=slug to URL or enter above. Auto-detecting...
          </div>
        </div>
      `:null}

      <div className="card">
        <div className="now-playing">
          ${song?.thumbnail_url
            ?h`<img className="now-thumb" src=${song.thumbnail_url} alt="" />`
            :song?.artist?.thumbnail_url
              ?h`<img className="now-thumb" src=${song.artist.thumbnail_url} alt="" />`
              :h`<div className="now-icon">${'\u266B'}</div>`}
          <div className="now-info">
            <div className="now-title">${song?.name||'No song data'}</div>
            <div className="now-artist">${song?.artist?.name||''}</div>
            <div className="now-meta">
              ${uptime?h`<span className=${'badge '+(uptime.is_up?'badge-up':'badge-down')}>${uptime.is_up?'UP':'DOWN'}${uptime.latency_ms?' '+uptime.latency_ms+'ms':''}</span>`:null}
              ${np?.listeners!=null?h`<span className="badge badge-listeners">${np.listeners} listeners</span>`:null}
              ${metadata?.title?h`<span>${metadata.title}</span>`:null}
              ${np?.timestamp?h`<span>Updated: ${new Date(np.timestamp).toLocaleTimeString()}</span>`:null}
            </div>
          </div>
        </div>
      </div>

      <div className="card">
        <audio ref=${audioRef} controls></audio>
        <div className="row" style=${{marginTop:'8px'}}>
          <button className=${codec==='aac'?'active':''} onClick=${()=>switchCodec('aac')}>AAC+</button>
          <button className=${codec==='master'?'active':''} onClick=${()=>switchCodec('master')}>Auto</button>
        </div>
      </div>

      <div className="card">
        <div className="tab-bar">
          <button className=${tab==='history'?'active':''} onClick=${()=>setTab('history')}>
            History${historyEntries.length?' ('+historyEntries.length+')':''}
          </button>
          <button className=${tab==='stats'?'active':''} onClick=${()=>setTab('stats')}>Stats</button>
        </div>

        ${tab==='history'?h`<${HistoryPanel} entries=${historyEntries} stationSlug=${stationSlug}
          onLoadMore=${loadOlderHistory}
          loading=${historyLoading} done=${historyDone} />`:null}

        ${tab==='stats'?h`
          <div className="stats">
            ${Object.entries(stats).map(([k,v])=>h`<div className="stat" key=${k}><span className="k">${k}</span><span className="v">${v}</span></div>`)}
            ${metadata?h`
              <div className="stat"><span className="k">station_id</span><span className="v">${metadata.id}</span></div>
              <div className="stat"><span className="k">slug</span><span className="v">${metadata.slug}</span></div>
              ${uptime?h`
                <div className="stat"><span className="k">uptime</span><span className="v">${uptime.is_up?'UP':'DOWN'}</span></div>
                <div className="stat"><span className="k">latency</span><span className="v">${uptime.latency_ms}ms</span></div>
              `:null}
            `:null}
          </div>
        `:null}
      </div>
    </div>
  `;
}

function HistoryPanel({entries,stationSlug,onLoadMore,loading,done}){
  const scrollRef=useRef(null);

  const onScroll=useCallback(()=>{
    const el=scrollRef.current;
    if(!el||loading||done)return;
    if(el.scrollTop+el.clientHeight>=el.scrollHeight-40){
      onLoadMore();
    }
  },[loading,done,onLoadMore]);

  if(!stationSlug)return h`<div style=${{padding:'10px',color:'var(--text-dim)',textAlign:'center',fontSize:'13px'}}>No station detected</div>`;
  if(entries.length===0&&!loading)return h`<div style=${{padding:'10px',color:'var(--text-dim)',textAlign:'center',fontSize:'13px'}}>No song history yet</div>`;

  // Show newest first
  const sorted=entries.slice().reverse();

  return h`
    <div ref=${scrollRef} onScroll=${onScroll} style=${{maxHeight:'450px',overflowY:'auto'}}>
      ${sorted.map((entry,i)=>{
        const d=new Date(entry.timestamp);
        const prevD=i>0?new Date(sorted[i-1].timestamp):null;
        const showDate=!prevD||d.toDateString()!==prevD.toDateString();
        const isNewest=i===0;
        return h`
          <${React.Fragment} key=${entry.timestamp+'-'+i}>
            ${showDate?h`<div style=${{padding:'4px 10px',fontSize:'10px',color:'var(--text-dim)',background:'var(--bg-dark)',textTransform:'uppercase',letterSpacing:'.5px',fontWeight:600}}>${d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})}</div>`:null}
            <div className=${'history-item'+(isNewest?' playing':'')}>
              ${entry.song?.thumbnail_url
                ?h`<img className="history-thumb" src=${entry.song.thumbnail_url} alt="" />`
                :entry.song?.artist?.thumbnail_url
                  ?h`<img className="history-thumb" src=${entry.song.artist.thumbnail_url} alt="" />`
                  :h`<div className="history-thumb-placeholder">${'\u266B'}</div>`}
              <div className="history-info">
                <div className="history-song">${entry.song?.name||'Unknown'}</div>
                <div className="history-artist">${entry.song?.artist?.name||''}</div>
              </div>
              ${entry.listeners!=null?h`<span className="history-listeners">${entry.listeners}</span>`:null}
              <span className="history-time">${d.toLocaleTimeString()}</span>
              ${isNewest?h`<span className="history-play">${'\u266B'}</span>`:null}
            </div>
          <//>
        `;
      })}
      ${loading?h`<div style=${{padding:'12px',textAlign:'center',color:'var(--text-dim)',fontSize:'12px'}}>Loading older songs...</div>`:null}
      ${done&&entries.length>0?h`<div style=${{padding:'8px',textAlign:'center',color:'var(--text-dim)',fontSize:'11px'}}>No more history</div>`:null}
    </div>
    <div style=${{padding:'4px 10px',fontSize:'11px',color:'var(--text-dim)',borderTop:'1px solid var(--border)'}}>
      ${entries.length} songs loaded
    </div>
  `;
}

ReactDOM.createRoot(document.getElementById('root')).render(h`<${App} />`);
</script>
</body>
</html>
