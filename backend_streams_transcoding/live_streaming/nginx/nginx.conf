worker_processes 1;
pid /tmp/nginx/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 256;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    upstream playlist_generator {
        server 127.0.0.1:8081;
    }

    upstream health_server {
        server 127.0.0.1:8082;
    }

    proxy_cache_path /data/cache/playlist
        levels=1:2 keys_zone=playlist:2m max_size=50m
        inactive=7d use_temp_path=off;

    proxy_cache_path /data/cache/s3
        levels=1:2 keys_zone=s3_cache:2m max_size=100m
        inactive=10m use_temp_path=off;

    server {
        listen 8080;
        root /data;
        server_tokens off;

        # CORS
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Content-Type, Accept, Origin" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        location = /favicon.ico {
            return 204;
            access_log off;
        }

        # Player page
        location = / {
            root /app;
            try_files /player.html =404;
        }
        location = /player.html {
            root /app;
            try_files /player.html =404;
        }

        # ── Metadata (song info) ──
        location = /metadata/index.json {
            alias /data/metadata/index.json;
            add_header Cache-Control "no-store";
        }
        location ~ ^/metadata/[0-9][0-9][0-9][0-9]/.*\.json$ {
            root /data;
            add_header Cache-Control "public, max-age=86400, immutable";
        }

        # ── Status API ──
        location = /status.json {
            proxy_pass http://playlist_generator;
            proxy_set_header Host $host;
            add_header Cache-Control "no-store";
        }
        location = /availability.json {
            proxy_pass http://playlist_generator;
            proxy_set_header Host $host;
            add_header Cache-Control "no-store";
        }

        # ── Playlists (dynamic from generator) ──
        location = /master.m3u8 {
            proxy_pass http://playlist_generator;
            proxy_set_header Host $host;
            add_header Cache-Control "no-store, must-revalidate";
        }
        # Playlists — blocking reload support (_HLS_msn can hold up to 12s)
        # Cache live playlists for 2s; bypass ONLY for _HLS_msn/timestamp params
        # Random query params (ref=, s=) still hit cache
        location = /index.m3u8 {
            proxy_pass http://playlist_generator;
            proxy_set_header Host $host;
            proxy_read_timeout 15;
            proxy_cache playlist;
            proxy_cache_key $uri;
            proxy_cache_valid 200 2s;
            proxy_cache_valid 503 1s;
            proxy_cache_lock on;
            proxy_cache_bypass $arg__HLS_msn$arg_timestamp;
            proxy_no_cache $arg__HLS_msn$arg_timestamp;
            add_header X-Cache-Status $upstream_cache_status always;
        }
        location = /aac/index.m3u8 {
            proxy_pass http://playlist_generator;
            proxy_set_header Host $host;
            proxy_read_timeout 15;
            proxy_cache playlist;
            proxy_cache_key $uri;
            proxy_cache_valid 200 2s;
            proxy_cache_valid 503 1s;
            proxy_cache_lock on;
            proxy_cache_bypass $arg__HLS_msn$arg_timestamp;
            proxy_no_cache $arg__HLS_msn$arg_timestamp;
            add_header X-Cache-Status $upstream_cache_status always;
        }
        location = /opus/index.m3u8 {
            proxy_pass http://playlist_generator;
            proxy_set_header Host $host;
            proxy_read_timeout 15;
            proxy_cache playlist;
            proxy_cache_key $uri;
            proxy_cache_valid 200 2s;
            proxy_cache_valid 503 1s;
            proxy_cache_lock on;
            proxy_cache_bypass $arg__HLS_msn$arg_timestamp;
            proxy_no_cache $arg__HLS_msn$arg_timestamp;
            add_header X-Cache-Status $upstream_cache_status always;
        }

        # ── AAC+ segments ──
        # /segments/*.ts — backward compat for /index.m3u8
        location ~ ^/segments/.*\.ts$ {
            try_files /hls/aac$uri @s3_aac_compat;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
        location @s3_aac_compat {
            set $s3_host "${S3_BUCKET}.${S3_ENDPOINT}";
            proxy_pass https://$s3_host/${STATION_SLUG}/hls/aac$uri;
            proxy_set_header Host $s3_host;
            proxy_ssl_server_name on;
            proxy_cache s3_cache;
            proxy_cache_key "aac$uri";
            proxy_cache_valid 200 10m;
            proxy_cache_valid 404 5s;
            proxy_cache_lock on;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
        # /aac/segments/*.ts
        location ~ ^/aac/segments/.*\.ts$ {
            try_files /hls$uri @s3_aac;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
        location @s3_aac {
            set $s3_host "${S3_BUCKET}.${S3_ENDPOINT}";
            proxy_pass https://$s3_host/${STATION_SLUG}/hls$uri;
            proxy_set_header Host $s3_host;
            proxy_ssl_server_name on;
            proxy_cache s3_cache;
            proxy_cache_key $uri;
            proxy_cache_valid 200 10m;
            proxy_cache_valid 404 5s;
            proxy_cache_lock on;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ── Opus init + segments ──
        location = /opus/init.mp4 {
            alias /data/hls/opus/init.mp4;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
        location ~ ^/opus/segments/.*\.m4s$ {
            try_files /hls$uri @s3_opus;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
        location @s3_opus {
            set $s3_host "${S3_BUCKET}.${S3_ENDPOINT}";
            proxy_pass https://$s3_host/${STATION_SLUG}/hls$uri;
            proxy_set_header Host $s3_host;
            proxy_ssl_server_name on;
            proxy_cache s3_cache;
            proxy_cache_key $uri;
            proxy_cache_valid 200 10m;
            proxy_cache_valid 404 5s;
            proxy_cache_lock on;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location = /health {
            proxy_pass http://health_server;
            proxy_set_header Host $host;
            proxy_connect_timeout 3;
            proxy_read_timeout 3;
        }
    }
}
