worker_processes 1;
pid /tmp/nginx/nginx.pid;
error_log /dev/stderr warn;

# Compression modules (installed via nginx-mod-http-brotli, nginx-mod-http-zstd)
load_module modules/ngx_http_brotli_filter_module.so;
load_module modules/ngx_http_brotli_static_module.so;
load_module modules/ngx_http_zstd_filter_module.so;
load_module modules/ngx_http_zstd_static_module.so;

events {
    worker_connections 256;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # ── Response compression ──
    # Compress text-like responses (m3u8 playlists, JSON metadata, HTML).
    # .ts segments are MPEG-TS binary (already near-optimal) — intentionally excluded.
    # Negotiation honors Accept-Encoding: zstd > br > gzip (clients requesting
    # "deflate" fall back to gzip, which nginx cannot produce as raw deflate).
    #
    # Shared type list:
    #   application/vnd.apple.mpegurl  — HLS playlist
    #   application/json               — metadata
    #   text/plain text/css text/html application/javascript

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types application/vnd.apple.mpegurl application/json text/plain text/css application/javascript;

    brotli on;
    brotli_comp_level 5;
    brotli_min_length 256;
    brotli_types application/vnd.apple.mpegurl application/json text/plain text/css application/javascript;

    zstd on;
    zstd_comp_level 3;
    zstd_min_length 256;
    zstd_types application/vnd.apple.mpegurl application/json text/plain text/css application/javascript;

    # Session tracking log format for listener analytics
    log_format session_access '$remote_addr - $remote_user [$time_local] "$request" '
        '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
        'session_id="$arg_s" ref="$arg_ref" '
        'real_ip="$http_x_forwarded_for" cf_ip="$http_cf_connecting_ip"';

    upstream health_server {
        server 127.0.0.1:8082;
    }

    upstream playlist_generator {
        server 127.0.0.1:8081;
    }

    server {
        listen 8080;
        root /data;
        server_tokens off;

        # CORS — must be repeated in every location that uses add_header,
        # because nginx's add_header in a location block replaces server-level ones.
        # Range / Content-Range / Content-Length are listed in both Allow-Headers
        # and Expose-Headers so HLS clients (hls.js, AVPlayer) can issue Range
        # requests on .ts segments and read back range-related response headers.
        set $cors_origin "*";
        set $cors_methods "GET, HEAD, OPTIONS";
        set $cors_headers "Range, Content-Range, Content-Length, Content-Type, Accept, Origin";
        set $cors_expose_headers "Content-Range, Content-Length";

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods $cors_methods always;
        add_header Access-Control-Allow-Headers $cors_headers always;
        add_header Access-Control-Expose-Headers $cors_expose_headers always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        location = /favicon.ico {
            return 204;
            access_log off;
        }

        # Station config (station slug from env var, used by player)
        location = /config.json {
            default_type application/json;
            return 200 '{"station_slug":"${STATION_SLUG}"}';
        }

        # Player page
        location = / {
            root /app;
            try_files /player.html =404;
        }
        location = /player.html {
            root /app;
            try_files /player.html =404;
        }

        # ── Metadata (song info) ──
        location = /metadata/index.json {
            alias /data/metadata/index.json;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods $cors_methods always;
            add_header Access-Control-Allow-Headers $cors_headers always;
            add_header Access-Control-Expose-Headers $cors_expose_headers always;
            add_header Cache-Control "no-store";
        }
        location ~ ^/metadata/[0-9][0-9][0-9][0-9]/.*\.json$ {
            root /data;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods $cors_methods always;
            add_header Access-Control-Allow-Headers $cors_headers always;
            add_header Access-Control-Expose-Headers $cors_expose_headers always;
            add_header Cache-Control "public, max-age=86400, immutable";
        }

        # ── HLS Playlists (generated by playlist_generator.py with EXT-X-PROGRAM-DATE-TIME) ──
        # Proxied to the playlist generator which produces playlists from pure
        # arithmetic, including EXT-X-PROGRAM-DATE-TIME tags derived from segment
        # epoch filenames. This enables hls.js and mobile players to read
        # programDateTime for accurate metadata timestamp sync.
        location = /index.m3u8 {
            proxy_pass http://playlist_generator/index.m3u8;
            proxy_set_header Host $host;
            proxy_connect_timeout 3;
            proxy_read_timeout 3;
            access_log /tmp/nginx_session_access.log session_access;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods $cors_methods always;
            add_header Access-Control-Allow-Headers $cors_headers always;
            add_header Access-Control-Expose-Headers $cors_expose_headers always;
            add_header Cache-Control "no-store";
            types { application/vnd.apple.mpegurl m3u8; }
        }
        location = /aac/index.m3u8 {
            proxy_pass http://playlist_generator/aac/index.m3u8;
            proxy_set_header Host $host;
            proxy_connect_timeout 3;
            proxy_read_timeout 3;
            access_log /tmp/nginx_session_access.log session_access;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods $cors_methods always;
            add_header Access-Control-Allow-Headers $cors_headers always;
            add_header Access-Control-Expose-Headers $cors_expose_headers always;
            add_header Cache-Control "no-store";
            types { application/vnd.apple.mpegurl m3u8; }
        }

        # ── Master playlist ──
        location = /master.m3u8 {
            proxy_pass http://playlist_generator/master.m3u8;
            proxy_set_header Host $host;
            proxy_connect_timeout 3;
            proxy_read_timeout 3;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods $cors_methods always;
            add_header Access-Control-Allow-Headers $cors_headers always;
            add_header Access-Control-Expose-Headers $cors_expose_headers always;
        }

        # ── HLS Segments (served from disk, written by ffmpeg) ──
        # /segments/*.ts — backward compat path
        location ~ ^/segments/(.+\.ts)$ {
            alias /data/hls/aac/$1;
            access_log /tmp/nginx_session_access.log session_access;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods $cors_methods always;
            add_header Access-Control-Allow-Headers $cors_headers always;
            add_header Access-Control-Expose-Headers $cors_expose_headers always;
            add_header Cache-Control "public, s-maxage=10800, max-age=10800, no-transform, immutable";
        }
        # /aac/segments/*.ts — backward compat path
        location ~ ^/aac/segments/(.+\.ts)$ {
            alias /data/hls/aac/$1;
            access_log /tmp/nginx_session_access.log session_access;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods $cors_methods always;
            add_header Access-Control-Allow-Headers $cors_headers always;
            add_header Access-Control-Expose-Headers $cors_expose_headers always;
            add_header Cache-Control "public, s-maxage=10800, max-age=10800, no-transform, immutable";
        }
        # Direct segment access (ffmpeg writes seg-N.ts next to live.m3u8).
        # The playlist references segments by bare filename, so this serves
        # /seg-N.ts and any other backward-compat *.ts paths from the same dir.
        location ~ ^/(.+\.ts)$ {
            alias /data/hls/aac/$1;
            access_log /tmp/nginx_session_access.log session_access;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods $cors_methods always;
            add_header Access-Control-Allow-Headers $cors_headers always;
            add_header Access-Control-Expose-Headers $cors_expose_headers always;
            add_header Cache-Control "public, s-maxage=10800, max-age=10800, no-transform, immutable";
        }

        location = /health {
            proxy_pass http://health_server;
            proxy_set_header Host $host;
            proxy_connect_timeout 3;
            proxy_read_timeout 3;
        }
    }
}
