worker_processes 1;
pid /tmp/nginx/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 256;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    upstream playlist_generator {
        server 127.0.0.1:8081;
    }

    upstream health_server {
        server 127.0.0.1:8082;
    }

    server {
        listen 8080;
        root /data;
        server_tokens off;

        # CORS — must be repeated in every location that uses add_header,
        # because nginx's add_header in a location block replaces server-level ones.
        set $cors_origin "*";
        set $cors_methods "GET, HEAD, OPTIONS";
        set $cors_headers "Range, Content-Type, Accept, Origin";

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods $cors_methods always;
        add_header Access-Control-Allow-Headers $cors_headers always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        location = /favicon.ico {
            return 204;
            access_log off;
        }

        # Station config (station slug from env var, used by player)
        location = /config.json {
            default_type application/json;
            return 200 '{"station_slug":"${STATION_SLUG}"}';
        }

        # Player page
        location = / {
            root /app;
            try_files /player.html =404;
        }
        location = /player.html {
            root /app;
            try_files /player.html =404;
        }

        # ── Metadata (song info) ──
        location = /metadata/index.json {
            alias /data/metadata/index.json;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods $cors_methods always;
            add_header Access-Control-Allow-Headers $cors_headers always;
            add_header Cache-Control "no-store";
        }
        location ~ ^/metadata/[0-9][0-9][0-9][0-9]/.*\.json$ {
            root /data;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods $cors_methods always;
            add_header Access-Control-Allow-Headers $cors_headers always;
            add_header Cache-Control "public, max-age=86400, immutable";
        }

        # ── Status API ──
        location = /status.json {
            proxy_pass http://playlist_generator;
            proxy_set_header Host $host;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods $cors_methods always;
            add_header Access-Control-Allow-Headers $cors_headers always;
            add_header Cache-Control "no-store";
        }

        # ── Playlists (CDN-cacheable, generated from pure math) ──
        location = /master.m3u8 {
            proxy_pass http://playlist_generator;
            proxy_set_header Host $host;
            # Static — cache forever at CDN
        }
        location = /index.m3u8 {
            proxy_pass http://playlist_generator;
            proxy_set_header Host $host;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods $cors_methods always;
            add_header Access-Control-Allow-Headers $cors_headers always;
        }
        location = /aac/index.m3u8 {
            proxy_pass http://playlist_generator;
            proxy_set_header Host $host;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods $cors_methods always;
            add_header Access-Control-Allow-Headers $cors_headers always;
        }

        # ── AAC+ segments (served from disk only) ──
        # /segments/*.ts — backward compat for /index.m3u8
        location ~ ^/segments/.*\.ts$ {
            try_files /hls/aac$uri =404;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods $cors_methods always;
            add_header Access-Control-Allow-Headers $cors_headers always;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
        # /aac/segments/*.ts
        location ~ ^/aac/segments/.*\.ts$ {
            try_files /hls$uri =404;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods $cors_methods always;
            add_header Access-Control-Allow-Headers $cors_headers always;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location = /health {
            proxy_pass http://health_server;
            proxy_set_header Host $host;
            proxy_connect_timeout 3;
            proxy_read_timeout 3;
        }
    }
}
