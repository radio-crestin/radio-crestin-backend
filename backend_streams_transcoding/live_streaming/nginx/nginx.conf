worker_processes 1;
pid /tmp/nginx/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 256;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    upstream playlist_generator {
        server 127.0.0.1:8081;
    }

    # Playlist cache for timestamped/historical requests
    proxy_cache_path /data/cache/playlist
        levels=1:2
        keys_zone=playlist:2m
        max_size=50m
        inactive=7d
        use_temp_path=off;

    # S3 segment cache — local cache for segments fetched from S3
    proxy_cache_path /data/cache/s3
        levels=1:2
        keys_zone=s3_cache:2m
        max_size=100m
        inactive=10m
        use_temp_path=off;

    server {
        listen 8080;
        root /data;
        server_tokens off;

        # ── HLS playlists — proxy to playlist generator ──
        # Master:    /index.m3u8
        # Variants:  /hls/low.m3u8, /hls/high.m3u8
        # Historical: /index.m3u8?timestamp=X
        location = /index.m3u8 {
            proxy_pass http://playlist_generator;
            proxy_set_header Host $host;

            proxy_cache            playlist;
            proxy_cache_key        $uri$is_args$args;
            proxy_cache_valid      200 24h;
            proxy_cache_valid      503 5s;
            proxy_cache_lock       on;
            proxy_cache_lock_age   5s;
            proxy_cache_use_stale  error timeout updating http_500 http_502 http_503;
            proxy_cache_bypass     $http_cache_control;
            proxy_buffering        on;

            add_header X-Cache-Status $upstream_cache_status always;
        }

        location ~ ^/hls/(low|high)\.m3u8$ {
            proxy_pass http://playlist_generator;
            proxy_set_header Host $host;

            # Live variant playlists — no cache (player polls every few seconds)
            add_header Cache-Control "no-store, must-revalidate" always;
        }

        # ── DASH manifest — served from disk, never cached ──
        location = /manifest.mpd {
            add_header Cache-Control "no-store, must-revalidate";
        }

        # ── Shared fMP4 segments (.m4s) — try local, fallback to S3 ──
        location ~ /segments/.*\.m4s$ {
            try_files $uri @s3_segment;

            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Segment-Source "local" always;
        }

        # S3 fallback for archived segments
        location @s3_segment {
            set $s3_host "${S3_BUCKET}.${S3_ENDPOINT}";
            set $s3_key "/${STATION_SLUG}$uri";

            proxy_pass https://$s3_host$s3_key;
            proxy_set_header Host $s3_host;
            proxy_ssl_server_name on;

            proxy_cache s3_cache;
            proxy_cache_key $uri;
            proxy_cache_valid 200 10m;
            proxy_cache_valid 404 5s;
            proxy_cache_lock on;

            proxy_hide_header x-amz-request-id;
            proxy_hide_header x-amz-id-2;

            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Cache-Status $upstream_cache_status always;
            add_header X-Segment-Source "s3" always;
        }

        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
}
